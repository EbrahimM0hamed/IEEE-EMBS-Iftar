<html lang="en" dir="ltr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IEEE EMBS Cairo University — My Registration</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Nunito:wght@300;400;600;700;800&display=swap"
    rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <style>
    :root {
      --purple-deep: #120d2e;
      --purple-dark: #1a1040;
      --purple-mid: #2d1b6e;
      --purple-vivid: #4a2cc4;
      --purple-glow: #6b3fe8;
      --purple-light: #9b6ff0;
      --purple-pale: #c4a8f5;
      --accent: #b388ff;
      --accent2: #7c4dff;
      --gold: #ffd180;
      --gold-dim: #c49a3c;
      --bg: #0d0921;
      --bg2: #110c2a;
      --bg3: #160f35;
      --surface: #1e1448;
      --surface2: #251a56;
      --border: #3d2d8a;
      --border-light: #5a42b0;
      --text: #ede8ff;
      --text-dim: #8b7cc8;
      --green: #69f0ae;
      --green-bg: #0a2218;
      --red: #ff6b8a;
      --red-bg: #220d15;
      --radius: 14px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        repeating-linear-gradient(60deg, rgba(107, 63, 232, .04) 0px, transparent 1px, transparent 30px),
        repeating-linear-gradient(-60deg, rgba(107, 63, 232, .04) 0px, transparent 1px, transparent 30px),
        repeating-linear-gradient(0deg, rgba(107, 63, 232, .03) 0px, transparent 1px, transparent 30px);
      pointer-events: none;
      z-index: 0;
    }

    /* ── HEADER ── */
    header {
      background: linear-gradient(180deg, #0a061f 0%, #1a0f45 50%, #200e50 100%);
      border-bottom: 1px solid var(--border);
      padding: 0 24px 0;
      text-align: center;
      position: relative;
      overflow: hidden;
      z-index: 1;
    }

    header::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(107, 63, 232, .35), transparent),
        radial-gradient(circle 200px at 20% 0%, rgba(179, 136, 255, .12), transparent),
        radial-gradient(circle 200px at 80% 0%, rgba(179, 136, 255, .12), transparent);
      pointer-events: none;
    }

    header::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--purple-glow), var(--accent), var(--purple-glow), transparent);
    }

    .header-inner {
      position: relative;
      z-index: 2;
      padding: 24px 0 20px;
    }

    .ieee-logo-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin-bottom: 12px;
    }

    .embs-icon {
      display: flex;
      flex-direction: column;
      gap: 4px;
      align-items: center;
    }

    .embs-icon .node-row {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .embs-icon .node {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 6px var(--purple-glow);
    }

    .embs-icon .line {
      width: 14px;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--purple-pale));
    }

    .embs-icon .node.big {
      width: 11px;
      height: 11px;
    }

    .ieee-wordmark {
      text-align: left;
    }

    .ieee-wordmark .ieee-text {
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.3rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: .1em;
      line-height: 1;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .ieee-wordmark .ieee-text .divider {
      width: 1px;
      height: 18px;
      background: rgba(255, 255, 255, .4);
    }

    .ieee-wordmark .cairo-text {
      font-size: .72rem;
      color: var(--purple-pale);
      letter-spacing: .06em;
      font-weight: 600;
      text-transform: uppercase;
      margin-left: 2px;
      margin-top: 2px;
    }

    .embs-text {
      font-family: 'Rajdhani', sans-serif;
      font-size: 3.2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #ffffff 0%, var(--accent) 60%, var(--purple-light) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: .05em;
      line-height: 1;
      filter: drop-shadow(0 0 20px rgba(107, 63, 232, .6));
    }

    .header-subtitle {
      font-size: .78rem;
      color: var(--text-dim);
      letter-spacing: .12em;
      text-transform: uppercase;
      font-weight: 600;
      margin-top: 8px;
    }

    .header-subtitle span {
      color: var(--purple-pale);
      margin: 0 8px;
    }

    .lanterns {
      display: flex;
      justify-content: space-between;
      padding: 0 20px;
      margin-top: 4px;
      opacity: .7;
    }

    .lantern {
      font-size: 1.4rem;
    }

    /* ── MAIN ── */
    .main {
      max-width: 620px;
      margin: 0 auto;
      padding: 28px 16px 40px;
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .intro-text {
      text-align: center;
      color: var(--text-dim);
      font-size: .95rem;
      line-height: 1.6;
    }

    .intro-text strong {
      color: var(--purple-pale);
    }

    /* ── SEARCH BOX ── */
    .search-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px;
      box-shadow: 0 4px 24px rgba(74, 44, 196, .15);
    }

    .search-label {
      font-family: 'Rajdhani', sans-serif;
      font-size: .78rem;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 10px;
      display: block;
    }

    .search-wrap {
      position: relative;
    }

    .search-input {
      width: 100%;
      background: var(--bg3);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 14px 48px 14px 16px;
      color: var(--text);
      font-family: 'Nunito', sans-serif;
      font-size: 1rem;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }

    .search-input:focus {
      border-color: var(--purple-glow);
      box-shadow: 0 0 0 3px rgba(107, 63, 232, .18);
    }

    .search-input::placeholder {
      color: var(--text-dim);
    }

    .search-btn {
      width: 100%;
      margin-top: 12px;
      background: linear-gradient(135deg, var(--purple-vivid), var(--purple-mid));
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 13px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: .08em;
      text-transform: uppercase;
      box-shadow: 0 4px 20px rgba(74, 44, 196, .4);
      transition: opacity .2s;
    }

    .search-btn:hover {
      opacity: .9;
    }

    /* ── RESULT CARD ── */
    .result-wrap {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .result-card {
      background: var(--bg3);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      animation: fadeIn .3s ease;
    }

    .result-card.confirmed {
      border-color: var(--green);
      background: var(--green-bg);
      box-shadow: 0 0 24px rgba(105, 240, 174, .1);
    }

    .result-card.not-found {
      border-color: var(--red);
      background: var(--red-bg);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: none;
      }
    }

    .status-banner {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-radius: 10px;
    }

    .status-banner.confirmed-banner {
      background: rgba(105, 240, 174, .12);
      border: 1px solid rgba(105, 240, 174, .3);
    }

    .status-banner.not-found-banner {
      background: rgba(255, 107, 138, .1);
      border: 1px solid rgba(255, 107, 138, .3);
    }

    .status-icon {
      font-size: 1.8rem;
    }

    .status-title {
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: .06em;
    }

    .status-title.ok {
      color: var(--green);
    }

    .status-title.err {
      color: var(--red);
    }

    .status-sub {
      font-size: .8rem;
      color: var(--text-dim);
      margin-top: 2px;
    }

    .reg-top {
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }

    .reg-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--purple-vivid), var(--purple-mid));
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
      border: 1.5px solid var(--border-light);
      box-shadow: 0 0 12px rgba(107, 63, 232, .3);
    }

    .reg-info {
      flex: 1;
    }

    .reg-name {
      font-weight: 700;
      font-size: 1.05rem;
      color: var(--text);
      margin-bottom: 6px;
    }

    .reg-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .badge {
      border-radius: 6px;
      padding: 2px 8px;
      font-weight: 700;
      font-size: .72rem;
      font-family: 'Rajdhani', sans-serif;
      letter-spacing: .04em;
    }

    .badge-year {
      background: rgba(107, 63, 232, .2);
      color: var(--accent);
      border: 1px solid rgba(107, 63, 232, .4);
    }

    .badge-payment {
      background: var(--surface2);
      color: var(--text-dim);
      border: 1px solid var(--border);
    }

    .detail-row {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: .85rem;
    }

    .detail-label {
      font-size: .68rem;
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 3px;
    }

    .detail-value {
      color: var(--text);
      line-height: 1.4;
    }

    .checkin-status {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 8px;
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700;
      font-size: .9rem;
      letter-spacing: .05em;
    }

    .checkin-status.checked-in {
      background: rgba(105, 240, 174, .1);
      border: 1px solid rgba(105, 240, 174, .3);
      color: var(--green);
    }

    .checkin-status.not-checked {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text-dim);
    }

    .no-result-msg {
      font-size: .9rem;
      color: var(--text-dim);
      line-height: 1.6;
    }

    .no-result-msg a {
      color: var(--purple-pale);
      text-decoration: none;
    }

    .no-result-msg a:hover {
      text-decoration: underline;
    }

    .results-count {
      font-size: .8rem;
      color: var(--text-dim);
      padding: 0 2px;
      font-weight: 700;
    }

    /* ── ORGANIZER NAV LINK ── */
    .organizer-nav {
      position: fixed;
      top: 12px;
      right: 14px;
      z-index: 100;
      background: rgba(74, 44, 196, .18);
      border: 1px solid var(--border-light);
      color: var(--purple-pale);
      border-radius: 99px;
      padding: 6px 14px;
      font-family: 'Rajdhani', sans-serif;
      font-size: .82rem;
      font-weight: 700;
      letter-spacing: .05em;
      text-decoration: none;
      text-transform: uppercase;
      transition: background .2s, border-color .2s;
    }

    .organizer-nav:hover {
      background: rgba(107, 63, 232, .28);
      border-color: var(--purple-glow);
    }

    @media (max-width: 600px) {
      .embs-text {
        font-size: 2.4rem;
      }
    }
  </style>
</head>

    // Firebase — read check-in status in real time (read-only for students)
    const firebaseConfig = {
      apiKey: "AIzaSyAkU1jobLqt89sz57y_p28ebe6RYXEd4Lk",
      authDomain: "ieee-embs-iftar.firebaseapp.com",
      databaseURL: "https://ieee-embs-iftar-default-rtdb.firebaseio.com",
      projectId: "ieee-embs-iftar",
      storageBucket: "ieee-embs-iftar.firebasestorage.app",
      messagingSenderId: "590730195853",
      appId: "1:590730195853:web:55f06f3b63d8b3e0cd83c4"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const checkinsRef = db.ref('checkins');

    let registrants = RAW.map((r, i) => ({ ...r, id: i }));
    let checkinData = {};

    // Sync check-in state so students see live status
    checkinsRef.on('value', (snap) => {
      checkinData = snap.val() || {};
      registrants.forEach(r => { r.checkedIn = checkinData[r.row] === true; });
      // Re-render if there's an active search
      const q = document.getElementById('search-input').value.trim();
      if (q.length >= 2) renderSearch(q);
    });

    function normalize(s) { return s.toLowerCase().replace(/\s+/g, ' ').trim(); }

    function initials(name) {
      return name.trim().split(/\s+/).slice(0, 2).map(w => w[0]).join('').toUpperCase();
    }

    function doSearch() {
      const q = document.getElementById('search-input').value.trim();
      if (q.length < 2) {
        document.getElementById('result-area').innerHTML =
          '<div style="text-align:center;color:var(--text-dim);padding:12px 0;font-size:.9rem;">Please enter at least 2 characters.</div>';
        return;
      }
      renderSearch(q);
    }

    function renderSearch(q) {
      const nq = normalize(q);
      const found = registrants.filter(r =>
        normalize(r.name).includes(nq) ||
        normalize(r.email).includes(nq)
      );

      const area = document.getElementById('result-area');

      if (found.length === 0) {
        area.innerHTML = `
          <div class="result-card not-found">
            <div class="status-banner not-found-banner">
              <span class="status-icon">😔</span>
              <div>
                <div class="status-title err">Not Found</div>
                <div class="status-sub">No registration found for "<strong>${escHtml(q)}</strong>"</div>
              </div>
            </div>
            <div class="no-result-msg">
              Please double-check your spelling or try your email address.<br>
              If you believe this is an error, please contact an organizer.
            </div>
          </div>`;
        return;
      }

      let html = `<div class="results-count">${found.length} result${found.length > 1 ? 's' : ''} found</div>
                  <div class="result-wrap">`;
      found.forEach(r => {
        const ini = initials(r.name);
        html += `
          <div class="result-card confirmed">
            <div class="status-banner confirmed-banner">
              <span class="status-icon">✅</span>
              <div>
                <div class="status-title ok">Registration Confirmed</div>
                <div class="status-sub">You are on the guest list — see you at Iftar! 🌙</div>
              </div>
            </div>
            <div class="reg-top">
              <div class="reg-avatar">${ini}</div>
              <div class="reg-info">
                <div class="reg-name">${escHtml(r.name)}</div>
                <div class="reg-meta">
                  <span class="badge badge-year">${r.year}</span>
                  <span class="badge badge-payment">${r.payment}</span>
                </div>
              </div>
            </div>
            <div class="detail-row">
              <div class="detail-label">🍽 Your Meal</div>
              <div class="detail-value">${escHtml(r.meal)}</div>
            </div>
            <div class="checkin-status ${r.checkedIn ? 'checked-in' : 'not-checked'}">
              ${r.checkedIn
            ? '✓ &nbsp;Already Checked In'
            : '⏳ &nbsp;Pending Check-In at the event'}
            </div>
          </div>`;
      });
      html += '</div>';
      area.innerHTML = html;
    }

    function escHtml(s) {
      return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }
